<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qubibi Collection — Pick Your Favourites</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100dvh;
  }

  header {
    padding: 2rem 1.5rem 1rem;
    text-align: center;
    border-bottom: 1px solid #222;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #888;
  }

  header p {
    font-size: 0.75rem;
    color: #555;
    margin-top: 0.4rem;
  }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    border-bottom: 1px solid #222;
    position: sticky;
    top: 0;
    background: #0a0a0a;
    z-index: 100;
  }

  .tab {
    padding: 0.8rem 1.5rem;
    font-family: inherit;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab:hover { color: #aaa; }
  .tab.active { color: #e0e0e0; border-bottom-color: #e0e0e0; }

  .tab .count {
    display: inline-block;
    background: #222;
    color: #888;
    font-size: 0.65rem;
    padding: 0.1rem 0.4rem;
    border-radius: 2px;
    margin-left: 0.3rem;
    min-width: 1.2rem;
    text-align: center;
  }

  .tab.active .count { background: #333; color: #ccc; }

  /* Masonry grid */
  .grid {
    columns: 4;
    column-gap: 3px;
    padding: 3px;
  }

  @media (max-width: 1200px) { .grid { columns: 3; } }
  @media (max-width: 800px) { .grid { columns: 2; } }

  .card {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    background: #111;
    break-inside: avoid;
    margin-bottom: 3px;
  }

  .card img {
    width: 100%;
    display: block;
    transition: transform 0.3s ease;
  }

  .card:hover img { transform: scale(1.03); }

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .lightbox.open { opacity: 1; pointer-events: all; }

  .lightbox .lb-img-wrap {
    position: relative;
    max-width: 92vw;
    max-height: 88vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lightbox img {
    max-width: 92vw;
    max-height: 88vh;
    object-fit: contain;
    border-radius: 2px;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .lightbox img.lb-exit-left {
    opacity: 0;
    transform: translateX(-40px) scale(0.97);
  }

  .lightbox img.lb-exit-right {
    opacity: 0;
    transform: translateX(40px) scale(0.97);
  }

  .lightbox img.lb-enter {
    opacity: 0;
    transform: scale(0.97);
  }

  .lightbox .lb-close {
    position: absolute;
    top: 1rem;
    right: 1.2rem;
    font-size: 1.5rem;
    color: #666;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    transition: color 0.15s;
    z-index: 1001;
  }

  .lightbox .lb-close:hover { color: #e0e0e0; }

  .lightbox .lb-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.5rem;
    color: #555;
    background: none;
    border: none;
    cursor: pointer;
    padding: 1rem;
    font-family: inherit;
    transition: color 0.15s;
    z-index: 1001;
  }

  .lightbox .lb-nav:hover { color: #e0e0e0; }
  .lightbox .lb-prev { left: 0.5rem; }
  .lightbox .lb-next { right: 0.5rem; }

  .lightbox .lb-info {
    position: absolute;
    bottom: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 1001;
  }

  .lightbox .lb-info .title {
    font-size: 0.8rem;
    color: #ccc;
  }

  .lightbox .lb-info .meta {
    font-size: 0.65rem;
    color: #555;
    margin-top: 0.2rem;
  }

  .lightbox .lb-fav {
    position: absolute;
    top: 1rem;
    left: 1.2rem;
    font-size: 1.3rem;
    background: none;
    border: none;
    cursor: pointer;
    color: #555;
    transition: color 0.15s;
    z-index: 1001;
  }

  .lightbox .lb-fav:hover, .lightbox .lb-fav.is-fav { color: #ff4466; }

  .card .overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0.6rem 0.7rem;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover .overlay { opacity: 1; }

  .card .overlay .title {
    font-size: 0.7rem;
    font-weight: 400;
    color: #e0e0e0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card .overlay .meta {
    font-size: 0.6rem;
    color: #888;
    margin-top: 0.15rem;
  }

  .card .fav-btn {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    width: 2rem;
    height: 2rem;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.5);
    color: #888;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.2s, background 0.2s, color 0.2s;
    backdrop-filter: blur(4px);
  }

  .card:hover .fav-btn { opacity: 1; }
  .card .fav-btn.is-fav { opacity: 1; color: #ff4466; background: rgba(0,0,0,0.7); }
  .card .fav-btn:hover { background: rgba(0,0,0,0.8); color: #ff4466; }

  /* Favourites list */
  .fav-list {
    max-width: 700px;
    margin: 0 auto;
    padding: 1rem;
  }

  .fav-list-empty {
    text-align: center;
    padding: 4rem 1rem;
    color: #444;
    font-size: 0.8rem;
  }

  .fav-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid #1a1a1a;
    user-select: none;
  }

  .fav-item .rank {
    font-size: 1rem;
    font-weight: 500;
    color: #555;
    min-width: 2rem;
    text-align: center;
  }

  .fav-item img {
    width: 64px;
    height: 64px;
    object-fit: cover;
    border-radius: 2px;
    background: #111;
    cursor: pointer;
  }

  .fav-item .info {
    flex: 1;
    min-width: 0;
  }

  .fav-item .info .title {
    font-size: 0.75rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .fav-item .info .meta {
    font-size: 0.65rem;
    color: #555;
    margin-top: 0.15rem;
  }

  .fav-item .actions {
    display: flex;
    gap: 0.3rem;
    flex-shrink: 0;
  }

  .fav-item .actions button {
    width: 1.8rem;
    height: 1.8rem;
    border: 1px solid #333;
    border-radius: 2px;
    background: none;
    color: #888;
    font-size: 0.75rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    transition: all 0.15s;
  }

  .fav-item .actions button:hover { border-color: #666; color: #e0e0e0; }
  .fav-item .actions button.remove:hover { border-color: #ff4466; color: #ff4466; }

  .fav-item.dragging { opacity: 0.4; }
  .fav-item.drag-over { border-top: 2px solid #ff4466; }

  /* Link to raster */
  .card .raster-link {
    position: absolute;
    top: 0.5rem;
    left: 0.5rem;
    font-size: 0.6rem;
    color: #888;
    text-decoration: none;
    background: rgba(0,0,0,0.5);
    padding: 0.2rem 0.4rem;
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.2s;
    backdrop-filter: blur(4px);
  }

  .card:hover .raster-link { opacity: 1; }
  .card .raster-link:hover { color: #e0e0e0; }

  @media (max-width: 600px) {
    header h1 { font-size: 0.9rem; }
    .tab { padding: 0.6rem 1rem; font-size: 0.65rem; }
  }
</style>
</head>

const BITS_BASE = "https://bits.raster.art";

function imgUrl(hash, size = 700) {
  const prefix = hash.substring(0, 4);
  return `${BITS_BASE}/${prefix}/${hash}/${size}.avif`;
}

function tokenUrl(aw) {
  return `https://www.raster.art/token/${aw.chain}/${aw.contract}/${aw.tid}`;
}

// State
let favourites = JSON.parse(localStorage.getItem("qubibi-favs") || "[]");

function saveFavs() {
  localStorage.setItem("qubibi-favs", JSON.stringify(favourites));
  updateCounts();
}

function isFav(id) { return favourites.includes(id); }

function toggleFav(id) {
  if (isFav(id)) {
    favourites = favourites.filter(f => f !== id);
  } else {
    favourites.push(id);
  }
  saveFavs();
  renderAll();
}

function moveFav(id, dir) {
  const idx = favourites.indexOf(id);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= favourites.length) return;
  [favourites[idx], favourites[newIdx]] = [favourites[newIdx], favourites[idx]];
  saveFavs();
  renderFavs();
}

function removeFav(id) {
  favourites = favourites.filter(f => f !== id);
  saveFavs();
  renderAll();
}

function updateCounts() {
  document.getElementById("count-all").textContent = ARTWORKS.length;
  document.getElementById("count-favs").textContent = favourites.length;
}

// Tabs
let currentTab = "all";
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    currentTab = tab.dataset.tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("view-all").style.display = currentTab === "all" ? "" : "none";
    document.getElementById("view-favs").style.display = currentTab === "favs" ? "" : "none";
    if (currentTab === "favs") renderFavs();
  });
});

// Lightbox
let lbIndex = -1;
let lbList = [];
const lbEl = document.getElementById("lightbox");
const lbImg = document.getElementById("lb-img");
const lbTitle = document.getElementById("lb-title");
const lbMeta = document.getElementById("lb-meta");
const lbFavBtn = document.getElementById("lb-fav");

function getCurrentLbArtwork() {
  if (lbIndex < 0 || lbIndex >= lbList.length) return null;
  const id = lbList[lbIndex];
  return ARTWORKS.find(a => a.id === id);
}

function showLbArtwork(aw) {
  lbImg.src = imgUrl(aw.hash, 1800);
  lbTitle.textContent = aw.name !== aw.title ? `${aw.title} — ${aw.name}` : aw.title;
  lbMeta.textContent = "";
  lbFavBtn.classList.toggle("is-fav", isFav(aw.id));
}

function openLightbox(list, idx) {
  lbList = list;
  lbIndex = idx;
  const aw = getCurrentLbArtwork();
  if (!aw) return;
  lbImg.classList.remove("lb-exit-left", "lb-exit-right", "lb-enter");
  showLbArtwork(aw);
  lbEl.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeLightbox() {
  lbEl.classList.remove("open");
  document.body.style.overflow = "";
  lbIndex = -1;
  lbList = [];
}

let lbNavLock = false;
function lbNav(dir) {
  if (lbIndex < 0 || lbList.length <= 1 || lbNavLock) return;
  lbNavLock = true;
  const exitClass = dir < 0 ? "lb-exit-right" : "lb-exit-left";
  lbImg.classList.add(exitClass);

  setTimeout(() => {
    let next = lbIndex + dir;
    if (next < 0) next = lbList.length - 1;
    if (next >= lbList.length) next = 0;
    lbIndex = next;
    const aw = getCurrentLbArtwork();
    if (!aw) { lbNavLock = false; return; }

    // Hide old image completely, swap src, wait for load
    lbImg.style.visibility = "hidden";
    lbImg.classList.remove("lb-exit-left", "lb-exit-right");
    lbImg.classList.add("lb-enter");

    const newSrc = imgUrl(aw.hash, 1800);
    lbTitle.textContent = aw.name !== aw.title ? `${aw.title} — ${aw.name}` : aw.title;
    lbMeta.textContent = "";
    lbFavBtn.classList.toggle("is-fav", isFav(aw.id));

    const reveal = () => {
      lbImg.style.visibility = "";
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          lbImg.classList.remove("lb-enter");
          lbNavLock = false;
        });
      });
    };

    if (lbImg.src === newSrc) {
      reveal();
    } else {
      lbImg.onload = () => { lbImg.onload = null; reveal(); };
      lbImg.src = newSrc;
    }
  }, 250);
}

lbEl.querySelector(".lb-close").addEventListener("click", closeLightbox);
lbEl.querySelector(".lb-prev").addEventListener("click", () => lbNav(-1));
lbEl.querySelector(".lb-next").addEventListener("click", () => lbNav(1));
lbFavBtn.addEventListener("click", () => {
  const aw = getCurrentLbArtwork();
  if (!aw) return;
  toggleFav(aw.id);
  lbFavBtn.classList.toggle("is-fav", isFav(aw.id));
});
lbEl.addEventListener("click", e => {
  if (e.target === lbEl || e.target.classList.contains("lb-img-wrap")) closeLightbox();
});

document.addEventListener("keydown", e => {
  if (lbIndex < 0) return;
  if (e.key === "Escape") closeLightbox();
  else if (e.key === "ArrowLeft") lbNav(-1);
  else if (e.key === "ArrowRight") lbNav(1);
  else if (e.key === "f" || e.key === "F") {
    const aw = getCurrentLbArtwork();
    if (!aw) return;
    toggleFav(aw.id);
    lbFavBtn.classList.toggle("is-fav", isFav(aw.id));
  }
});

// Render grid
function renderGrid() {
  const grid = document.getElementById("view-all");
  grid.innerHTML = "";
  const allIds = ARTWORKS.map(a => a.id);
  ARTWORKS.forEach((aw, idx) => {
    const card = document.createElement("div");
    card.className = "card";

    const displayName = aw.name !== aw.title ? aw.name : aw.title;

    card.innerHTML = `
      <img src="${imgUrl(aw.hash)}" alt="${displayName}" loading="lazy" style="aspect-ratio: ${aw.ar}">
      <a class="raster-link" href="${tokenUrl(aw)}" target="_blank" rel="noopener">raster</a>
      <button class="fav-btn ${isFav(aw.id) ? 'is-fav' : ''}" title="Toggle favourite">\u2665</button>
      <div class="overlay">
        <div class="title">${displayName}</div>
      </div>
    `;

    card.querySelector(".fav-btn").addEventListener("click", e => {
      e.stopPropagation();
      toggleFav(aw.id);
    });

    card.addEventListener("click", e => {
      if (e.target.closest(".fav-btn") || e.target.closest(".raster-link")) return;
      openLightbox(allIds, idx);
    });

    grid.appendChild(card);
  });
}

// Render favourites
function renderFavs() {
  const list = document.getElementById("fav-list");
  if (favourites.length === 0) {
    list.innerHTML = '<div class="fav-list-empty">No favourites yet. Go to the All tab and click hearts.</div>';
    return;
  }
  list.innerHTML = "";
  favourites.forEach((id, idx) => {
    const aw = ARTWORKS.find(a => a.id === id);
    if (!aw) return;
    const item = document.createElement("div");
    item.className = "fav-item";
    item.draggable = true;
    item.dataset.id = id;
    const displayName = aw.name !== aw.title ? aw.name : aw.title;

    item.innerHTML = `
      <div class="rank">${idx + 1}</div>
      <img src="${imgUrl(aw.hash, 350)}" alt="${displayName}">
      <div class="info">
        <div class="title">${displayName}</div>
        <div class="meta">${aw.title}</div>
      </div>
      <div class="actions">
        <button class="up" title="Move up">\u2191</button>
        <button class="down" title="Move down">\u2193</button>
        <button class="remove" title="Remove">\u00d7</button>
      </div>
    `;

    item.querySelector(".up").addEventListener("click", e => { e.stopPropagation(); moveFav(id, -1); });
    item.querySelector(".down").addEventListener("click", e => { e.stopPropagation(); moveFav(id, 1); });
    item.querySelector(".remove").addEventListener("click", e => { e.stopPropagation(); removeFav(id); });

    const openFavLb = e => {
      if (e.target.closest(".actions")) return;
      e.preventDefault();
      openLightbox([...favourites], idx);
    };
    item.querySelector("img").addEventListener("click", openFavLb);
    item.querySelector(".info").addEventListener("click", openFavLb);

    // Drag and drop
    item.addEventListener("dragstart", e => {
      e.dataTransfer.setData("text/plain", id);
      item.classList.add("dragging");
    });
    item.addEventListener("dragend", () => item.classList.remove("dragging"));
    item.addEventListener("dragover", e => {
      e.preventDefault();
      item.classList.add("drag-over");
    });
    item.addEventListener("dragleave", () => item.classList.remove("drag-over"));
    item.addEventListener("drop", e => {
      e.preventDefault();
      item.classList.remove("drag-over");
      const draggedId = parseInt(e.dataTransfer.getData("text/plain"));
      const fromIdx = favourites.indexOf(draggedId);
      const toIdx = favourites.indexOf(id);
      if (fromIdx === toIdx) return;
      favourites.splice(fromIdx, 1);
      favourites.splice(toIdx, 0, draggedId);
      saveFavs();
      renderFavs();
    });

    list.appendChild(item);
  });
}

function renderAll() {
  renderGrid();
  if (currentTab === "favs") renderFavs();
  updateCounts();
}

renderAll();
</script>
